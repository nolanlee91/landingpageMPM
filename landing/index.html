<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MicroPokerMaster — AI Poker Leak Finder for Live Cash Players</title>
<meta name="description" content="Paste a hand, find your biggest leak and a better line in seconds. MicroPokerMaster builds a Leak Profile that ranks every leak by the dollars it costs you — built for live cash micro & low-stakes players." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: {
            950: '#050816',
            900: '#070b1f',
            800: '#0b1228',
            700: '#101a36',
            600: '#172246',
            500: '#1f2c55',
          },
          line: 'rgba(255,255,255,0.07)',
          line2: 'rgba(255,255,255,0.12)',
          mint: {
            DEFAULT: '#57f287',
            soft: '#7af5a3',
            deep: '#1e8b4a',
          },
          haze: '#6aa9ff',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          display: ['"Bebas Neue"', 'Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        boxShadow: {
          'glow-mint': '0 0 0 1px rgba(87,242,135,0.25), 0 10px 40px -10px rgba(87,242,135,0.45), 0 0 120px -20px rgba(87,242,135,0.35)',
          'glow-mint-sm': '0 0 0 1px rgba(87,242,135,0.18), 0 6px 24px -8px rgba(87,242,135,0.35)',
          'glow-blue': '0 0 80px -20px rgba(106,169,255,0.45)',
          'card': '0 1px 0 rgba(255,255,255,0.04) inset, 0 30px 60px -30px rgba(0,0,0,0.6)',
        },
      },
    },
  };
</script>

<style>
  html, body { background: #050816; color: #e6e9f2; scroll-behavior: smooth; }
  body { font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Bebas Neue', Inter, sans-serif; letter-spacing: 0.005em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Base background — layered radial accents for cinematic depth */
  .bg-stage {
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(87,242,135,0.10), transparent 60%),
      radial-gradient(900px 500px at 10% 20%, rgba(106,169,255,0.08), transparent 60%),
      radial-gradient(1200px 800px at 50% 120%, rgba(87,242,135,0.07), transparent 60%),
      #050816;
  }

  /* Subtle dot grid */
  .bg-grid {
    background-image:
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
  }

  /* Glass card */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .glass-strong {
    background: linear-gradient(180deg, rgba(20,28,55,0.7), rgba(8,12,28,0.55));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  /* Mint button */
  .btn-mint {
    background: linear-gradient(180deg, #79f8a0 0%, #57f287 60%, #3ad972 100%);
    color: #03130a;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      0 8px 24px -8px rgba(87,242,135,0.55),
      0 0 0 1px rgba(87,242,135,0.35);
    transition: transform .15s ease, box-shadow .25s ease, filter .25s ease;
  }
  .btn-mint:hover { transform: translateY(-1px); filter: brightness(1.05); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 14px 36px -10px rgba(87,242,135,0.7), 0 0 0 1px rgba(87,242,135,0.5); }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    color: #eef2ff;
    transition: all .2s ease;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }

  /* Phone mockup frame */
  .phone {
    background: linear-gradient(180deg, #16203d, #070b1f);
    border-radius: 44px;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.6),
      0 50px 80px -30px rgba(0,0,0,0.8),
      0 0 0 8px rgba(255,255,255,0.02);
  }
  .phone-screen {
    border-radius: 34px;
    overflow: hidden;
    position: relative;
    background: #050816;
  }
  .phone-screen img { display: block; width: 100%; height: auto; }
  .phone-notch {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 22px; background: #050816; border-radius: 14px; z-index: 2;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .phone-notch::after {
    content: ''; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #1a2a4a, #050816 70%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Glow ring for phone */
  .phone-glow {
    position: absolute; inset: -40px;
    background: radial-gradient(closest-side, rgba(87,242,135,0.28), transparent 70%);
    filter: blur(20px);
    z-index: -1;
    pointer-events: none;
  }
  .phone-glow.blue { background: radial-gradient(closest-side, rgba(106,169,255,0.25), transparent 70%); }

  /* Floating animation */
  @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
  @keyframes float-y-2 { 0%,100% { transform: translateY(-6px); } 50% { transform: translateY(10px); } }
  @keyframes float-y-3 { 0%,100% { transform: translateY(4px); } 50% { transform: translateY(-12px); } }
  .float-a { animation: float-y 7s ease-in-out infinite; }
  .float-b { animation: float-y-2 9s ease-in-out infinite; }
  .float-c { animation: float-y-3 8.5s ease-in-out infinite; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* Hairline divider */
  .hairline { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent); height: 1px; }

  /* Marquee */
  @keyframes marquee { 0% { transform: translateX(0);} 100% { transform: translateX(-50%);} }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* Small chip */
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    font-size: 12px; color: #c8cfe2; font-weight: 500; letter-spacing: 0.02em;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #57f287; box-shadow: 0 0 12px #57f287; }

  /* Pretty type */
  h1, h2, h3, p { text-wrap: pretty; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #050816; }
  ::-webkit-scrollbar-thumb { background: #1a2342; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #243057; }

  /* Spade icon container — brand mark */
  .brand-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(180deg, #79f8a0, #3ad972);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px -6px rgba(87,242,135,0.7), inset 0 1px 0 rgba(255,255,255,0.4);
    color: #03130a;
  }

  /* Section padding */
  .section { padding: 96px 0; }
  @media (max-width: 768px) {
    .section { padding: 72px 0; }
  }

  /* Subtle felt texture (the "poker table" reference, very subtle) */
  .felt {
    background-image:
      radial-gradient(circle at 50% 30%, rgba(87,242,135,0.05), transparent 50%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px);
  }

  /* Card link hover */
  .feature-card { transition: transform .35s ease, border-color .35s ease, box-shadow .35s ease, background .35s ease; }
  .feature-card:hover { transform: translateY(-4px); border-color: rgba(87,242,135,0.25); box-shadow: 0 30px 60px -30px rgba(87,242,135,0.18); }

  /* Vertical poker rail */
  .rail-mint { background: linear-gradient(180deg, transparent, #57f287, transparent); width: 2px; box-shadow: 0 0 12px #57f287; }

  /* Stat number */
  .stat-num { font-family: 'Bebas Neue', Inter, sans-serif; font-size: 56px; line-height: 1; letter-spacing: 0.01em; }
  @media (max-width: 640px) { .stat-num { font-size: 44px; } }

  /* Bar chart bar */
  .bar { background: linear-gradient(180deg, rgba(87,242,135,0.85), rgba(87,242,135,0.35)); border-radius: 4px; box-shadow: 0 0 14px rgba(87,242,135,0.35); }
  .bar.muted { background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)); box-shadow: none; }

  /* No selection on chrome */
  .nosel { user-select: none; -webkit-user-select: none; }

  /* Hide scroll on mobile horizontal */
  .no-sb::-webkit-scrollbar { display: none; }
  .no-sb { scrollbar-width: none; }
</style>
</head>
<body class="bg-stage min-h-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="src/icons.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/atoms.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/sections.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/leak.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
